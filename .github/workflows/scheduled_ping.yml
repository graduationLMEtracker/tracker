name: Scheduled Discord Ping
on:
  schedule:
    # 16:25 UTC is 12:25 PM Eastern
    # The '0' at the end stands for Sunday
    - cron: '25 16 * * 0'
  workflow_dispatch: # Allows you to trigger it manually via the Actions tab

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Send Ping
        run: |
          curl -H "Content-Type: application/json" \
               -X POST \
               -d '{
                 "content": "🛡️ <@&1401746882216198215> **Test Ping!**\nIf you see this, the scheduler is working. Check tracker: https://your-website-url.com"
               }' \
               https://discord.com/api/webhooks/1495471140452176016/P9EfEVqgOA1zq7d2YGR-PMlE8ZLl51I8b7jqXrx_awqdHVIlAmCdfecziu7jQQOljSIv
