name: Scheduled Discord Ping
on:
  schedule:
    # 16:25 UTC is 12:25 PM Eastern
    - cron: '25 16 * * 0'
  workflow_dispatch: # Allows you to trigger it manually for testing

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Send Ping
        run: |
          curl -H "Content-Type: application/json" \
               -X POST \
               -d '{
                 "content": "🛡️ <@&1401746882216198215> **Test Ping!**\nIf you see this, the scheduler is working. Check tracker: https://your-website-url.com"
               }' \
               ${{ secrets.DISCORD_WEBHOOK }}
