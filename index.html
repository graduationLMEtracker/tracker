<!DOCTYPE html>
<html>
<head>
    <title>LME Tracker Pro</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div class="container">
        <div id="auth-status">
            <span id="user-email"></span>
            <button id="login-btn" class="btn primary" onclick="location.href='login.html'">Login</button>
            <button id="logout-btn" class="btn danger" style="display:none;" onclick="logout()">Logout</button>
        </div>

        <div class="card">
            <h1>LME Tracker</h1>
            
            <div id="admin-tools" style="display:none;" class="admin-bar">
                <div>
                    <input type="text" id="new-member-name" placeholder="New Member Name">
                    <button class="btn primary" onclick="addMember()">Add</button>
                </div>
                <button class="btn warning" onclick="clearAllHits()">Reset All Checks</button>
            </div>

            <table>
                <thead>
                    <tr>
                        <th>Member Name</th>
                        <th>H1</th><th>H2</th><th>H3</th>
                        <th class="admin-only" style="display:none;">Action</th>
                    </tr>
                </thead>
                <tbody id="member-list"></tbody>
            </table>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
