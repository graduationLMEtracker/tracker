<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LME Tracker Hub</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div class="container">
        <div id="auth-status">
            <span id="secret-banana" onclick="secretPost()">🍌</span>
            
            <span id="user-email"></span>
            <button id="login-btn" class="btn primary" onclick="location.href='login.html'">Admin Login</button>
            <button id="logout-btn" class="btn danger" style="display:none;" onclick="logout()">Logout</button>
        </div>

        <div class="card">
            <div class="nav-toggle">
                <button id="btn-main" class="btn primary" onclick="switchTable('boss_hits')">Graduation</button>
                <button id="btn-v1" class="btn secondary" onclick="switchTable('boss_hits_v1')">Graduation 1.0</button>
            </div>

            <h1 id="list-title">Graduation Tracker</h1>

            <div id="admin-tools" style="display:none;" class="admin-bar">
                <div class="input-group">
                    <input type="text" id="new-member-name" placeholder="Member Name">
                    <button class="btn primary" onclick="addMember()">Add Member</button>
                </div>
                <div class="action-group">
                    <button class="btn discord" onclick="sendToDiscord()">Post to Discord</button>
                    <button class="btn warning" onclick="clearAllHits()">Reset All</button>
                </div>
            </div>

            <table>
                <thead>
                    <tr>
                        <th>Member Name</th>
                        <th>H1</th>
                        <th>H2</th>
                        <th>H3</th>
                        <th class="admin-only" style="display:none;">Action</th>
                    </tr>
                </thead>
                <tbody id="member-list">
                    <tr><td colspan="5">Connecting to database...</td></tr>
                </tbody>
            </table>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
